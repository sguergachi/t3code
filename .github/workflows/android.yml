name: Mobile APK Build

# Build a sideloadable Android APK and publish it to the rolling
# `android-latest` GitHub Release (or to a pushed `android-*` tag).
#
# Installable design choices:
# - Stable CI keystore (same cert every run) so later builds can update earlier ones
# - Dedicated applicationId `com.t3tools.t3code.sideload` so this never conflicts
#   with older `com.t3tools.t3code` installs that used one-off signing keys
# - Monotonic versionCode from the workflow run number
on:
  workflow_dispatch:
    inputs:
      variant:
        description: "App variant to build"
        required: true
        type: choice
        default: production
        options:
          - production
          - preview
          - development
      build-type:
        description: "Build type"
        required: true
        type: choice
        default: release
        options:
          - release
          - debug
  push:
    tags:
      - "android-*"

permissions:
  contents: read
  packages: read

concurrency:
  group: apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK (${{ inputs.variant || 'production' }})
    uses: ./.github/workflows/build-android-apk.yml
    with:
      app_variant: ${{ inputs.variant || 'production' }}
      build_type: ${{ inputs.build-type || 'release' }}
      build_version: ${{ github.ref_name }}
      runs_on: ubuntu-latest
      # Never collide with an older store/sideload install of com.t3tools.t3code.
      android_package_override: com.t3tools.t3code.sideload
    secrets: inherit

  publish-release:
    name: Publish APK to GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - id: app_token
        name: Mint release app token
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          pattern: t3code-apk-*
          merge-multiple: true
          path: release-assets

      - name: Prepare release assets
        id: meta
        env:
          VARIANT: ${{ inputs.variant || 'production' }}
          BUILD_TYPE: ${{ inputs.build-type || 'release' }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          apk_files=(release-assets/*.apk)
          if (( ${#apk_files[@]} != 1 )); then
            echo "Expected exactly one APK, found ${#apk_files[@]}:" >&2
            ls -la release-assets/ >&2 || true
            exit 1
          fi

          source_apk="${apk_files[0]}"
          mkdir -p release-publish

          # Always publish a stable name so the download URL never changes.
          cp "$source_apk" release-publish/t3code-android.apk
          cp "$source_apk" "release-publish/t3code-android-${VARIANT}-${BUILD_TYPE}.apk"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Android APK ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=android-latest" >> "$GITHUB_OUTPUT"
            echo "name=Android APK (latest)" >> "$GITHUB_OUTPUT"
          fi

          echo "variant=${VARIANT}" >> "$GITHUB_OUTPUT"
          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          ls -lh release-publish/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            ## Install

            **Download:** [t3code-android.apk](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/t3code-android.apk)

            | | |
            |---|---|
            | **Package** | `com.t3tools.t3code.sideload` |
            | **Variant** | `${{ steps.meta.outputs.variant }}` / `${{ steps.meta.outputs.build_type }}` |
            | **Commit** | `${{ steps.meta.outputs.sha_short }}` |
            | **Workflow** | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            This package id is **only** for GitHub sideload builds. It will not
            conflict with an older `com.t3tools.t3code` install. Every build uses
            the same CI signing key so future APKs can update this install.

            ### Phone tips
            1. Open the download link in **Chrome** (not the GitHub app)
            2. Allow **Install unknown apps** for Chrome / Files
            3. Open the finished download from **Downloads**
          prerelease: true
          make_latest: false
          files: release-publish/*.apk
          fail_on_unmatched_files: true
          overwrite_files: true
          token: ${{ steps.app_token.outputs.token || github.token }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## APK Release"
            echo ""
            echo "- **Tag**: \`${{ steps.meta.outputs.tag }}\`"
            echo "- **Status**: ${{ job.status }}"
            if [ "${{ job.status }}" = "success" ]; then
              echo "- **Download**: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/t3code-android.apk"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
