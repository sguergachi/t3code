name: Build Android APK

on:
  workflow_call:
    inputs:
      app_variant:
        description: "App variant (development, preview, production)"
        required: true
        type: string
      build_type:
        description: "debug or release"
        required: true
        type: string
      build_version:
        description: "Version string for the artifact filename"
        required: false
        type: string
        default: ""
      runs_on:
        description: "Runner label"
        required: false
        type: string
        default: "blacksmith-8vcpu-ubuntu-2404"
      timeout_minutes:
        description: "Job timeout"
        required: false
        type: number
        default: 60
      clerk_publishable_key:
        required: false
        type: string
        default: ""
      clerk_jwt_template:
        required: false
        type: string
        default: ""
      clerk_cli_oauth_client_id:
        required: false
        type: string
        default: ""
      relay_url:
        required: false
        type: string
        default: ""
      upload_name:
        required: false
        type: string
        default: ""
      android_version_code:
        description: "Explicit versionCode; 0 = use github.run_number"
        required: false
        type: number
        default: 0
      android_package_override:
        description: "Optional applicationId override for sideload builds"
        required: false
        type: string
        default: ""

jobs:
  build-apk:
    name: Build APK (${{ inputs.app_variant }} / ${{ inputs.build_type }})
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      APP_VARIANT: ${{ inputs.app_variant }}
      BUILD_TYPE: ${{ inputs.build_type }}
      NODE_OPTIONS: --max-old-space-size=8192
      T3CODE_CLERK_PUBLISHABLE_KEY: ${{ inputs.clerk_publishable_key }}
      T3CODE_CLERK_JWT_TEMPLATE: ${{ inputs.clerk_jwt_template }}
      T3CODE_CLERK_CLI_OAUTH_CLIENT_ID: ${{ inputs.clerk_cli_oauth_client_id }}
      T3CODE_RELAY_URL: ${{ inputs.relay_url }}
      # Keep versionCode rising so devices accept the new APK as an update.
      ANDROID_VERSION_CODE: ${{ inputs.android_version_code > 0 && inputs.android_version_code || github.run_number }}
      T3CODE_ANDROID_PACKAGE_OVERRIDE: ${{ inputs.android_package_override }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Expose pnpm
        run: |
          pnpm_version="$(node --print "require('./package.json').packageManager.split('@').pop()")"
          vp_pnpm_dir="$HOME/.vite-plus/package_manager/pnpm/$pnpm_version/pnpm/bin"
          echo "$vp_pnpm_dir" >> "$GITHUB_PATH"
          "$vp_pnpm_dir/pnpm" --version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Install Android build tools
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Prebuild Android
        working-directory: apps/mobile
        run: |
          echo "APP_VARIANT=$APP_VARIANT"
          echo "ANDROID_VERSION_CODE=$ANDROID_VERSION_CODE"
          echo "T3CODE_ANDROID_PACKAGE_OVERRIDE=${T3CODE_ANDROID_PACKAGE_OVERRIDE:-<none>}"
          EXPO_NO_GIT_STATUS=1 npx expo prebuild \
            --clean \
            --platform android \
            --no-install

      - name: Setup Gradle
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Build APK
        working-directory: apps/mobile/android
        run: |
          set -euo pipefail
          # arm64-v8a covers essentially all phones that sideload modern RN apps.
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug \
              -Dorg.gradle.java.home="$JAVA_HOME" \
              -PreactNativeArchitectures=arm64-v8a
          else
            ./gradlew assembleRelease \
              -Dorg.gradle.java.home="$JAVA_HOME" \
              -PreactNativeArchitectures=arm64-v8a
          fi

      - name: Sign APK with stable CI keystore
        working-directory: apps/mobile/android
        run: |
          set -euo pipefail

          apk_dir="app/build/outputs/apk/$BUILD_TYPE"
          apk="$(find "$apk_dir" -maxdepth 1 -name '*.apk' -type f | head -n 1)"
          if [ -z "$apk" ]; then
            echo "No APK in $apk_dir" >&2
            ls -laR app/build/outputs/apk >&2 || true
            exit 1
          fi

          keystore="$GITHUB_WORKSPACE/apps/mobile/ci/android-ci.keystore"
          if [ ! -f "$keystore" ]; then
            echo "Missing stable keystore: $keystore" >&2
            exit 1
          fi

          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort | tail -n 1)"
          zipalign="$(find "$ANDROID_HOME/build-tools" -name zipalign -type f | sort | tail -n 1)"
          if [ -z "$apksigner" ] || [ -z "$zipalign" ]; then
            echo "apksigner/zipalign not found under $ANDROID_HOME/build-tools" >&2
            exit 1
          fi

          # Always re-sign with the committed CI key so every release APK shares
          # one certificate. Random per-run keys make updates uninstallable.
          "$zipalign" -f -p 4 "$apk" app-aligned.apk
          "$apksigner" sign \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --ks "$keystore" \
            --ks-pass pass:t3code-ci-store \
            --ks-key-alias t3code-ci \
            --key-pass pass:t3code-ci-store \
            --out app-signed.apk \
            app-aligned.apk
          rm -f "$apk" app-aligned.apk
          mv app-signed.apk "$apk"

          echo "=== apksigner verify ==="
          "$apksigner" verify -v --print-certs "$apk" | tee /tmp/apk-certs.txt
          grep -q 'CN=T3 Code CI' /tmp/apk-certs.txt
          grep -Eq 'v2 scheme|Verified using v2' /tmp/apk-certs.txt

          echo "=== package info ==="
          aapt="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort | tail -n 1)"
          "$aapt" dump badging "$apk" | head -n 5

      - name: Package artifact
        id: package
        working-directory: apps/mobile/android
        run: |
          set -euo pipefail
          apk="$(find "app/build/outputs/apk/$BUILD_TYPE" -maxdepth 1 -name '*.apk' -type f | head -n 1)"
          version_suffix="${{ inputs.build_version }}"
          if [ -z "$version_suffix" ]; then
            version_suffix="$BUILD_TYPE"
          fi
          # Branch names may contain '/' — keep the filename path-safe.
          version_suffix="$(printf '%s' "$version_suffix" | tr '/\\ :' '----')"
          apk_name="t3code-android-${{ inputs.app_variant }}-${version_suffix}.apk"
          cp "$apk" "$apk_name"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"
          ls -lh "$apk_name"

      - name: Resolve artifact name
        id: artifact-name
        run: |
          if [ -n "${{ inputs.upload_name }}" ]; then
            echo "name=${{ inputs.upload_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=t3code-apk-${{ inputs.app_variant }}-${{ inputs.build_type }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: apps/mobile/android/${{ steps.package.outputs.apk_name }}
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          {
            echo "## APK Build"
            echo ""
            echo "- **Variant**: ${{ inputs.app_variant }}"
            echo "- **Type**: ${{ inputs.build_type }}"
            echo "- **versionCode**: ${{ env.ANDROID_VERSION_CODE }}"
            echo "- **package override**: ${{ inputs.android_package_override || 'none' }}"
            echo "- **Status**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
