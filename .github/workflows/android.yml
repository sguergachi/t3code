name: Mobile APK Build

# Build standalone APK for Android
# Supports manual trigger and automatic builds on tags
on:
  workflow_dispatch:
    inputs:
      variant:
        description: "App variant to build"
        required: true
        type: choice
        default: development
        options:
          - development
          - preview
          - production
      build-type:
        description: "Build type (debug or release)"
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release
  push:
    tags:
      - "android-*"

permissions:
  contents: read
  packages: read

concurrency:
  group: apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK (${{ inputs.variant || 'production' }})
    uses: ./.github/workflows/build-android-apk.yml
    with:
      app_variant: ${{ inputs.variant || 'production' }}
      build_type: ${{ inputs.build-type || 'release' }}
      build_version: ${{ github.ref_name }}
      runs_on: ubuntu-latest
    secrets: inherit
